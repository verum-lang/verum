# Spindle integration-test pg_hba.conf — production posture.
#
# Forces scram-sha-256 for every host connection. Local socket
# entries below are kept for the in-container `pg_isready`
# healthcheck; no Spindle test connects through them.
#
# Spec ties: §6.1.2 (SCRAM-SHA-256-PLUS), §8.13.1 (TLS verify-full
# normative — TLS layer integration is a separate workstream;
# until then the test harness uses scram-sha-256 over plain TCP
# loopback only, which is the documented integration-test posture).

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     scram-sha-256
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             0.0.0.0/0               scram-sha-256
