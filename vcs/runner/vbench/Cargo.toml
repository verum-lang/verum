[package]
name = "vbench"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "VCS (Verum Compliance Suite) benchmarking tool for performance testing"

[lib]
name = "vbench"
path = "src/lib.rs"

[[bin]]
name = "vbench"
path = "src/main.rs"

[dependencies]
# Core utilities
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# CLI
clap = { workspace = true }
colored = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }

# Data structures
indexmap = { workspace = true }

# Benchmarking
criterion = { workspace = true }

# Async
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "sync", "time", "macros", "process", "fs"] }
futures = { workspace = true }

# Concurrency
rayon = { workspace = true }
num_cpus = { workspace = true }
parking_lot = { workspace = true }

# Time and statistics
chrono = { workspace = true }

# Regex for parsing benchmark files
regex = { workspace = true }

# File path handling
glob = { workspace = true }
walkdir = { workspace = true }

# CSV output for comparison data
csv = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_System_ProcessStatus",
    "Win32_System_Threading",
    "Win32_Foundation",
] }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true
