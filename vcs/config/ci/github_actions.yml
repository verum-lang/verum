# =============================================================================
# Verum Compliance Suite - GitHub Actions Workflow
# =============================================================================
#
# Production-grade CI/CD configuration for VCS
#
# Workflow Architecture:
#   1. l0-critical    -> L0 tests (100% required) - BLOCKING
#   2. l1-core        -> L1 tests (100% required) - BLOCKING
#   3. l2-standard    -> L2 tests (95%+ required) - BLOCKING
#   4. differential   -> Tier 0 vs Tier 3 semantic equivalence
#   5. full-suite     -> Complete L0-L4 (nightly/manual)
#   6. fuzzing        -> Fuzz testing (nightly/manual)
#   7. benchmarks     -> Performance benchmarks
#   8. coverage       -> Code coverage report
#
# Reference: VCS Spec Section 23 - CI/CD Integration
# =============================================================================

name: VCS Conformance

on:
  push:
    branches: [main, develop, 'release/**']
    paths:
      - 'vcs/**'
      - 'crates/**'
      - 'grammar/**'
      - '.github/workflows/vcs*.yml'

  pull_request:
    branches: [main, develop]
    paths:
      - 'vcs/**'
      - 'crates/**'
      - 'grammar/**'

  schedule:
    # Nightly at 2:00 AM UTC
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test levels (L0,L1,L2,L3,L4 or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - 'L0'
          - 'L0,L1'
          - 'L0,L1,L2'
          - 'all'
      fuzz_duration:
        description: 'Fuzzing duration'
        required: false
        default: '30m'
        type: choice
        options:
          - '10m'
          - '30m'
          - '1h'
          - '2h'
      run_benchmarks:
        description: 'Run performance benchmarks'
        required: false
        type: boolean
        default: false
      run_coverage:
        description: 'Generate coverage report'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  VCS_PARALLEL: 8
  VCS_TIMEOUT_DEFAULT: 30000
  VCS_TIMEOUT_EXTENDED: 600000

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # L0 Critical Tests - Must pass 100%
  # ===========================================================================
  l0-critical:
    name: L0 Critical Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      passed: ${{ steps.run-tests.outputs.passed }}
      total: ${{ steps.run-tests.outputs.total }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vtest -> target
          cache-on-failure: true

      - name: Build vtest
        run: |
          cd vcs/runner/vtest
          cargo build --release

      - name: Run L0 Critical Tests
        id: run-tests
        run: |
          cd vcs
          ../runner/vtest/target/release/vtest run \
            --level L0 \
            --parallel $VCS_PARALLEL \
            --timeout $VCS_TIMEOUT_DEFAULT \
            --format junit \
            --output reports/l0-results.xml \
            --config config/vcs.toml \
            --threshold 100.0

          # Parse results
          TOTAL=$(grep -oP 'tests="\K[0-9]+' reports/l0-results.xml | head -1 || echo "0")
          FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/l0-results.xml | head -1 || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$FAILURES" -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "::notice::L0 Critical Tests: $TOTAL tests passed"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::L0 Critical Tests: $FAILURES failures - MERGE BLOCKED"
            exit 1
          fi

      - name: Upload L0 Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: l0-test-results
          path: vcs/reports/l0-results.xml
          retention-days: 30

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'vcs/reports/l0-results.xml'
          fail_on_failure: true
          require_tests: true
          check_name: 'L0 Critical Tests'
          summary: true

  # ===========================================================================
  # L1 Core Tests - Must pass 100%
  # ===========================================================================
  l1-core:
    name: L1 Core Tests
    runs-on: ubuntu-latest
    needs: l0-critical
    timeout-minutes: 30
    outputs:
      passed: ${{ steps.run-tests.outputs.passed }}
      total: ${{ steps.run-tests.outputs.total }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vtest -> target

      - name: Build vtest
        run: cd vcs/runner/vtest && cargo build --release

      - name: Run L1 Core Tests
        id: run-tests
        run: |
          cd vcs
          ../runner/vtest/target/release/vtest run \
            --level L1 \
            --parallel $VCS_PARALLEL \
            --timeout $VCS_TIMEOUT_DEFAULT \
            --format junit \
            --output reports/l1-results.xml \
            --config config/vcs.toml \
            --threshold 100.0

          TOTAL=$(grep -oP 'tests="\K[0-9]+' reports/l1-results.xml | head -1 || echo "0")
          FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/l1-results.xml | head -1 || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$FAILURES" -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "::notice::L1 Core Tests: $TOTAL tests passed"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::L1 Core Tests: $FAILURES failures - MERGE BLOCKED"
            exit 1
          fi

      - name: Upload L1 Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: l1-test-results
          path: vcs/reports/l1-results.xml
          retention-days: 30

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'vcs/reports/l1-results.xml'
          fail_on_failure: true
          require_tests: true
          check_name: 'L1 Core Tests'

  # ===========================================================================
  # L2 Standard Tests - 95%+ required
  # ===========================================================================
  l2-standard:
    name: L2 Standard Tests
    runs-on: ubuntu-latest
    needs: l1-core
    timeout-minutes: 45
    outputs:
      passed: ${{ steps.run-tests.outputs.passed }}
      pass_rate: ${{ steps.run-tests.outputs.pass_rate }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vtest -> target

      - name: Build vtest
        run: cd vcs/runner/vtest && cargo build --release

      - name: Run L2 Standard Tests
        id: run-tests
        run: |
          cd vcs
          ../runner/vtest/target/release/vtest run \
            --level L2 \
            --parallel $VCS_PARALLEL \
            --timeout $VCS_TIMEOUT_DEFAULT \
            --format json \
            --output reports/l2-results.json \
            --config config/vcs.toml \
            --threshold 95.0 || true

          # Parse JSON results
          if [ -f reports/l2-results.json ]; then
            PASS_RATE=$(jq -r '.summary.pass_percentage // 0' reports/l2-results.json)
            TOTAL=$(jq -r '.summary.total // 0' reports/l2-results.json)
            PASSED=$(jq -r '.summary.passed // 0' reports/l2-results.json)
          else
            PASS_RATE="0"
            TOTAL="0"
            PASSED="0"
          fi

          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          if (( $(echo "$PASS_RATE >= 95.0" | bc -l) )); then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "::notice::L2 Standard Tests: ${PASS_RATE}% pass rate ($PASSED/$TOTAL)"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::L2 Standard Tests: ${PASS_RATE}% < 95% threshold - MERGE BLOCKED"
            exit 1
          fi

      - name: Upload L2 Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: l2-test-results
          path: vcs/reports/l2-results.json
          retention-days: 30

  # ===========================================================================
  # Differential Tests - Tier 0 vs Tier 3 Semantic Equivalence
  # ===========================================================================
  differential:
    name: Differential Tests
    runs-on: ubuntu-latest
    needs: l0-critical
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vtest -> target

      - name: Build vtest
        run: cd vcs/runner/vtest && cargo build --release

      - name: Run Differential Tests
        run: |
          cd vcs
          ../runner/vtest/target/release/vtest run \
            differential/ \
            --tier 0,3 \
            --parallel $VCS_PARALLEL \
            --format junit \
            --output reports/differential-results.xml \
            --config config/vcs.toml

          if ! grep -q 'failures="0"' reports/differential-results.xml 2>/dev/null; then
            echo "::error::Differential tests failed - Tier 0 and Tier 3 produce different results"
            exit 1
          fi

          echo "::notice::Differential tests passed - Tier 0 and Tier 3 are semantically equivalent"

      - name: Upload Differential Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: differential-test-results
          path: vcs/reports/differential-results.xml
          retention-days: 30

  # ===========================================================================
  # Full Test Suite (L3-L4) - Nightly or Manual
  # ===========================================================================
  full-suite:
    name: Full Test Suite (L3-L4)
    runs-on: ubuntu-latest
    needs: [l2-standard, differential]
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[full-test]')
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y z3

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vtest -> target

      - name: Build vtest
        run: cd vcs/runner/vtest && cargo build --release

      - name: Run L3 Extended Tests
        id: l3
        continue-on-error: true
        run: |
          cd vcs
          ../runner/vtest/target/release/vtest run \
            --level L3 \
            --parallel $VCS_PARALLEL \
            --timeout $VCS_TIMEOUT_EXTENDED \
            --format json \
            --output reports/l3-results.json \
            --config config/vcs.toml \
            --threshold 90.0 || true

          if [ -f reports/l3-results.json ]; then
            PASS_RATE=$(jq -r '.summary.pass_percentage // 0' reports/l3-results.json)
            if (( $(echo "$PASS_RATE < 90.0" | bc -l) )); then
              echo "::warning::L3 Extended tests below 90% threshold (${PASS_RATE}%)"
            else
              echo "::notice::L3 Extended tests: ${PASS_RATE}% pass rate"
            fi
          fi

      - name: Run L4 Performance Tests
        id: l4
        continue-on-error: true
        run: |
          cd vcs
          ../runner/vtest/target/release/vtest run \
            --level L4 \
            --parallel 4 \
            --timeout $VCS_TIMEOUT_EXTENDED \
            --format json \
            --output reports/l4-results.json \
            --config config/vcs.toml || true

          if [ -f reports/l4-results.json ]; then
            echo "L4 Performance test results (advisory):"
            jq '.summary' reports/l4-results.json
          fi

      - name: Upload Full Suite Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-suite-results
          path: |
            vcs/reports/l3-results.json
            vcs/reports/l4-results.json
          retention-days: 30

  # ===========================================================================
  # Fuzz Testing - Nightly or Manual
  # ===========================================================================
  fuzzing:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    needs: l0-critical
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vfuzz -> target
            vcs/fuzz -> target

      - name: Determine fuzz duration
        id: duration
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "duration=${{ github.event.inputs.fuzz_duration || '30m' }}" >> $GITHUB_OUTPUT
          else
            echo "duration=1h" >> $GITHUB_OUTPUT
          fi

      - name: Build vfuzz
        run: cd vcs/runner/vfuzz && cargo build --release

      - name: Run VCS Fuzzer
        continue-on-error: true
        run: |
          cd vcs
          mkdir -p fuzz/crashes fuzz/artifacts

          ../runner/vfuzz/target/release/vfuzz run \
            --targets all \
            --duration ${{ steps.duration.outputs.duration }} \
            --parallel 4 \
            --corpus fuzz/seeds/ \
            --crashes fuzz/crashes/ \
            --config config/vcs.toml || true

      - name: Run cargo-fuzz targets
        continue-on-error: true
        run: |
          cd vcs/fuzz

          # Run each fuzz target with time limit
          for target in lexer_fuzz parser_fuzz cbgr_fuzz; do
            echo "Fuzzing $target..."
            cargo +nightly fuzz run $target -- -max_total_time=600 2>/dev/null || true
          done

      - name: Check for crashes
        id: check-crashes
        run: |
          CRASH_COUNT=0

          if [ -d "vcs/fuzz/crashes" ]; then
            CRASH_COUNT=$(find vcs/fuzz/crashes -type f | wc -l)
          fi

          if [ -d "vcs/fuzz/artifacts" ]; then
            CRASH_COUNT=$((CRASH_COUNT + $(find vcs/fuzz/artifacts -type f 2>/dev/null | wc -l)))
          fi

          echo "crash_count=$CRASH_COUNT" >> $GITHUB_OUTPUT

          if [ "$CRASH_COUNT" -gt 0 ]; then
            echo "::warning::Fuzzing discovered $CRASH_COUNT crashes - see artifacts"
          else
            echo "::notice::No crashes found during fuzzing"
          fi

      - name: Upload Crash Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fuzz-crashes
          path: |
            vcs/fuzz/crashes/
            vcs/fuzz/artifacts/
          retention-days: 90
          if-no-files-found: ignore

  # ===========================================================================
  # Performance Benchmarks
  # ===========================================================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: l0-critical
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_benchmarks == 'true')
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vcs/runner/vbench -> target

      - name: Build vbench
        run: cd vcs/runner/vbench && cargo build --release

      - name: Download baseline
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: vcs-ci.yml
          branch: main
          name: benchmark-baseline
          path: vcs/baselines/
        continue-on-error: true

      - name: Run Benchmarks
        run: |
          cd vcs
          mkdir -p reports

          ../runner/vbench/target/release/vbench run \
            --suite all \
            --iterations 1000 \
            --warmup 100 \
            --config config/vcs.toml \
            --format json \
            --output reports/benchmark-results.json

      - name: Compare to Baseline
        id: compare
        run: |
          cd vcs

          if [ -f "baselines/benchmark-baseline.json" ]; then
            ../runner/vbench/target/release/vbench compare \
              --current reports/benchmark-results.json \
              --baseline baselines/benchmark-baseline.json \
              --threshold 10.0 \
              --format markdown \
              --output reports/benchmark-comparison.md || true

            if grep -q "REGRESSION" reports/benchmark-comparison.md 2>/dev/null; then
              echo "regression=true" >> $GITHUB_OUTPUT
              echo "::warning::Performance regression detected (>10%)"
            else
              echo "regression=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "regression=false" >> $GITHUB_OUTPUT
            echo "No baseline found - establishing new baseline"
          fi

      - name: Validate Thresholds
        continue-on-error: true
        run: |
          cd vcs
          ../runner/vbench/target/release/vbench validate \
            --thresholds config/thresholds.toml \
            --results reports/benchmark-results.json

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: vcs/reports/benchmark-results.json
          retention-days: 90

      - name: Upload Comparison Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-comparison
          path: vcs/reports/benchmark-comparison.md
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.compare.outputs.regression == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Performance Benchmark Warning

            Performance regression detected in this PR (>10% degradation).

            Please review the benchmark comparison report in the workflow artifacts.

  # ===========================================================================
  # Code Coverage
  # ===========================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [l1-core, l2-standard]
    if: >
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_coverage == 'true')
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-action@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate Coverage Data
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path lcov.info \
            -- --test-threads=4

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: Generate HTML Coverage Report
        run: |
          cargo llvm-cov --all-features --workspace \
            --html --output-dir coverage-html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 30

  # ===========================================================================
  # Generate Consolidated Report
  # ===========================================================================
  generate-report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [l0-critical, l1-core, l2-standard, differential]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Consolidate results
        run: |
          mkdir -p vcs/reports

          # Copy all result files
          find artifacts/ -name '*.xml' -exec cp {} vcs/reports/ \; 2>/dev/null || true
          find artifacts/ -name '*.json' -exec cp {} vcs/reports/ \; 2>/dev/null || true

      - name: Generate HTML Report
        run: |
          cd vcs
          chmod +x scripts/generate-report.sh
          ./scripts/generate-report.sh \
            --input reports/ \
            --output reports/vcs-consolidated-report.html \
            --title "VCS CI Report - $(date +%Y-%m-%d)" \
            --format html

      - name: Upload Consolidated Report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-report
          path: vcs/reports/vcs-consolidated-report.html
          retention-days: 30

  # ===========================================================================
  # Final Status Gate
  # ===========================================================================
  vcs-gate:
    name: VCS Gate
    runs-on: ubuntu-latest
    needs: [l0-critical, l1-core, l2-standard, differential]
    if: always()

    steps:
      - name: Check All Required Tests
        run: |
          echo "Checking VCS gate status..."

          FAILED=0

          if [ "${{ needs.l0-critical.result }}" != "success" ]; then
            echo "::error::L0 Critical tests failed or skipped"
            FAILED=1
          else
            echo "L0 Critical: PASSED"
          fi

          if [ "${{ needs.l1-core.result }}" != "success" ]; then
            echo "::error::L1 Core tests failed or skipped"
            FAILED=1
          else
            echo "L1 Core: PASSED"
          fi

          if [ "${{ needs.l2-standard.result }}" != "success" ]; then
            echo "::error::L2 Standard tests failed or skipped"
            FAILED=1
          else
            echo "L2 Standard: PASSED"
          fi

          if [ "${{ needs.differential.result }}" != "success" ]; then
            echo "::error::Differential tests failed or skipped"
            FAILED=1
          else
            echo "Differential: PASSED"
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::VCS Gate FAILED - Merge blocked"
            exit 1
          fi

          echo ""
          echo "::notice::VCS Gate PASSED - All required tests successful"
