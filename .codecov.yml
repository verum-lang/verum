codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "85...100"
  status:
    project:
      default:
        target: 95%
        threshold: 1%
        base: auto
        informational: false
    patch:
      default:
        target: 95%
        threshold: 1%
        base: auto
        informational: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

github_checks:
  annotations: true

ignore:
  - "tests/"
  - "benches/"
  - "examples/"
  - "target/"
  - "experiments/"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"

flags:
  unittests:
    paths:
      - crates/
    carryforward: true
  integration:
    paths:
      - crates/verum_integration_tests/
    carryforward: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: 95%
      - type: patch
        target: 95%

  individual_components:
    - component_id: verum_core
      name: Core
      paths:
        - crates/verum_core/**
    - component_id: verum_cbgr
      name: CBGR
      paths:
        - crates/verum_cbgr/**
    - component_id: verum_types
      name: Type System
      paths:
        - crates/verum_types/**
    - component_id: verum_parser
      name: Parser
      paths:
        - crates/verum_parser/**
        - crates/verum_lexer/**
    - component_id: verum_runtime
      name: Runtime
      paths:
        - crates/verum_runtime/**
    - component_id: verum_codegen
      name: Codegen
      paths:
        - crates/verum_codegen/**
    - component_id: verum_compiler
      name: Compiler
      paths:
        - crates/verum_compiler/**
