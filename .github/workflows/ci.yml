name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check (no features)
        run: cargo check --workspace

      - name: Check (verification feature)
        run: cargo check -p verum_cli --features verification

      - name: Test — verum_compiler lib
        run: cargo test -p verum_compiler --lib

      - name: Test — verum_types lib
        run: cargo test -p verum_types --lib

      - name: Test — verum_smt lib
        run: cargo test -p verum_smt --lib

      - name: Test — verum_cli lib
        run: cargo test -p verum_cli --features verification --lib

      - name: Test — feature gates e2e
        run: cargo test -p verum_cli --features verification --test feature_gates_e2e

      - name: Test — tier parity e2e
        run: cargo test -p verum_cli --features verification --test tier_parity_e2e

      - name: Differential testing — Tier 0 vs Tier 1
        run: |
          chmod +x vcs/differential/run_differential.sh
          VERUM_BIN=./target/debug/verum bash vcs/differential/run_differential.sh vcs/differential/tier-oracle/
        continue-on-error: true  # LLVM crash may affect some runs

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace -- -D warnings
        continue-on-error: true  # Clippy warnings are advisory for now

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        continue-on-error: true  # Format check is advisory for now
