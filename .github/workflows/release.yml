name: Release

# Versioned releases: push a `v*` tag → build the full platform matrix
# (shared with the rolling dev release via `build-verum.yml`) and publish
# a normal GitHub release with generated notes.
#
# Asset naming matches packaging/homebrew/verum.rb:
#   verum-<tag>-<triple>.tar.gz / .zip (+ .sha256, + combined SHA256SUMS)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-verum.yml
    with:
      artifact-version: ${{ github.ref_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: verum-*
          merge-multiple: true

      - name: Collect assets
        run: |
          set -euo pipefail
          mkdir -p dist
          find _artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec cp {} dist/ \;
          (cd dist && cat ./*.sha256 > SHA256SUMS)
          ls -lh dist/
          [[ -n "$(ls -A dist)" ]]

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Verum ${TAG}" \
              --generate-notes
          fi
