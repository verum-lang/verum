name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: verum-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: verum-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: verum-macos-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # The repo's `rust-toolchain.toml` pins the nightly channel
      # (verum_common uses `#![feature(pattern)]` and the workspace
      # is on edition 2024). Using @stable here would fail to build
      # — let cargo read rust-toolchain.toml on first invocation and
      # install the pinned channel automatically.
      - name: Install Rust toolchain (nightly per rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}
          components: rustfmt, clippy, rust-src

      - name: Fetch prebuilt LLVM
        uses: ./.github/actions/fetch-llvm

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p verum_cli --features verification

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/verum dist/verum
          chmod +x dist/verum
          tar czf ${{ matrix.artifact }}.tar.gz -C dist verum
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            verum-linux-x86_64/*.tar.gz
            verum-linux-x86_64/*.sha256
            verum-macos-aarch64/*.tar.gz
            verum-macos-aarch64/*.sha256
            verum-macos-x86_64/*.tar.gz
            verum-macos-x86_64/*.sha256
          generate_release_notes: true
