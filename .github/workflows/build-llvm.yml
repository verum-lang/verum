name: Build LLVM (prebuilt cache)

# Builds the Verum-specific LLVM + LLD + MLIR configuration described
# in `llvm/llvm.toml` and publishes it as a GitHub pre-release so the
# main CI / release workflows can download a matching binary instead
# of rebuilding LLVM from source on every run.
#
# Why not just re-use upstream LLVM releases?
#   `crates/llvm/verum_llvm_sys/build.rs` explicitly refuses system
#   or upstream LLVM — it needs the exact projects (`clang + lld + mlir`),
#   targets, and `MinSizeRel` static libraries produced by our
#   `llvm/build.sh`. Hence: one heavy build per LLVM version,
#   amortised across every downstream CI run.
#
# Tag scheme: `llvm-prebuilt-<llvmorg-tag>` — e.g. `llvm-prebuilt-llvmorg-21.1.8`.
# The composite action at `.github/actions/fetch-llvm` derives this
# tag from `llvm/llvm.toml` and downloads the matching archive.
#
# The resolve job checks WHICH per-triple archives are already attached
# to the release and only builds the missing ones — so adding a new
# triple to the matrix later back-fills that one asset instead of
# rebuilding the world (or being skipped entirely because the release
# object already exists).

on:
  push:
    branches: [main]
    paths:
      - 'llvm/llvm.toml'
      - 'llvm/build.sh'
      - '.github/workflows/build-llvm.yml'
      - '.github/actions/fetch-llvm/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild and overwrite every prebuilt asset even if it already exists"
        required: false
        default: "false"

concurrency:
  group: build-llvm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Job 1 — read `llvm/llvm.toml`, compute the prebuilt tag, and emit the
  # matrix of triples whose archive is missing (all triples on force_rebuild).
  # -------------------------------------------------------------------------
  resolve:
    name: Resolve LLVM version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      prebuilt_tag: ${{ steps.v.outputs.prebuilt_tag }}
      skip: ${{ steps.v.outputs.skip }}
      matrix: ${{ steps.v.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LLVM_TAG=$(awk -F'"' '/^tag[[:space:]]*=/ { print $2; exit }' llvm/llvm.toml)
          if [[ -z "${LLVM_TAG}" ]]; then
            echo "::error::Could not read \`tag\` from llvm/llvm.toml"
            exit 1
          fi
          PREBUILT_TAG="llvm-prebuilt-${LLVM_TAG}"
          echo "tag=${LLVM_TAG}"                     >> "$GITHUB_OUTPUT"
          echo "prebuilt_tag=${PREBUILT_TAG}"        >> "$GITHUB_OUTPUT"

          # triple → runner. One line per supported host platform.
          TRIPLES=(
            "x86_64-unknown-linux-gnu ubuntu-latest"
            "aarch64-unknown-linux-gnu ubuntu-24.04-arm"
            "aarch64-apple-darwin macos-latest"
            "x86_64-apple-darwin macos-15-intel"
            "x86_64-pc-windows-msvc windows-latest"
            "aarch64-pc-windows-msvc windows-11-arm"
          )

          FORCE="${{ github.event.inputs.force_rebuild || 'false' }}"
          EXISTING=""
          if gh release view "${PREBUILT_TAG}" --repo "${{ github.repository }}" \
               --json assets --jq '.assets[].name' > /tmp/assets.txt 2>/dev/null; then
            EXISTING=$(cat /tmp/assets.txt)
          fi

          INCLUDE=""
          for entry in "${TRIPLES[@]}"; do
            triple="${entry%% *}"
            runner="${entry##* }"
            archive="verum-llvm-${LLVM_TAG}-${triple}.tar.zst"
            if [[ "${FORCE}" != "true" ]] && grep -qxF "${archive}" <<< "${EXISTING}"; then
              echo "✓ ${archive} already published — skipping ${triple}"
              continue
            fi
            echo "→ will build ${triple} on ${runner}"
            INCLUDE+="{\"triple\":\"${triple}\",\"runner\":\"${runner}\"},"
          done

          if [[ -z "${INCLUDE}" ]]; then
            echo "All prebuilt archives already published; nothing to build"
            echo "skip=true"        >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false"       >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[${INCLUDE%,}]}" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------------
  # Job 2 — build LLVM on every (runner, triple) pair still missing.
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.triple }}
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 zstd

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja zstd

      # llvm/build.sh requires ninja on Windows (no `make` in MSVC land);
      # cmake + python are preinstalled on hosted Windows runners.
      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ninja zstandard

      - name: Load MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.triple == 'aarch64-pc-windows-msvc' && 'arm64' || 'x64' }}

      - name: Build LLVM
        working-directory: llvm
        shell: bash
        run: ./build.sh
        timeout-minutes: 340

      - name: Verify install layout
        working-directory: llvm
        shell: bash
        run: |
          set -euo pipefail
          # llvm-config gains a .exe suffix on Windows; static libs are
          # .a with GNU/clang toolchains and .lib with MSVC.
          test -f install/bin/llvm-config || test -f install/bin/llvm-config.exe
          test -d install/include
          # Match lib-prefixed Unix names (libLLVMCore.a, liblldCommon.a) AND
          # bare MSVC names (LLVMCore.lib, lldCommon.lib). LLD's libraries are
          # lowercase `lld*`, NOT `LLD*` — the old uppercase glob never matched,
          # so this sanity check aborted every prebuild despite a good install.
          ls install/lib/*LLVM*.a >/dev/null 2>&1 || ls install/lib/*LLVM*.lib >/dev/null
          ls install/lib/*lld*.a  >/dev/null 2>&1 || ls install/lib/*lld*.lib  >/dev/null
          ls install/lib/*MLIR*.a >/dev/null 2>&1 || ls install/lib/*MLIR*.lib >/dev/null

      - name: Strip sources + tests (shrink archive)
        working-directory: llvm/install
        shell: bash
        run: |
          rm -rf share/man share/doc
          # Keep headers, libs, and llvm-config. Drop everything else under bin/
          # except the binaries Verum's build.rs actually references
          # (patterns cover the .exe suffix on Windows).
          find bin -maxdepth 1 -type f \
            ! -name 'llvm-config*' \
            ! -name 'lld*' \
            ! -name 'clang*' \
            ! -name 'mlir-tblgen*' \
            -delete 2>/dev/null || true

      - name: Package archive
        working-directory: llvm
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="verum-llvm-${{ needs.resolve.outputs.tag }}-${{ matrix.triple }}.tar.zst"
          # Pipe through zstd explicitly — bsdtar/GNU-tar `--zstd` support
          # varies across runner images, the pipe form works everywhere.
          tar -cf - install | zstd -T0 -19 -o "${ARCHIVE}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi
          ls -lh "${ARCHIVE}" "${ARCHIVE}.sha256"
          # Sanity: archive must be < 2 GB (GitHub release asset limit is 2 GB)
          SIZE=$(stat -c%s "${ARCHIVE}" 2>/dev/null || stat -f%z "${ARCHIVE}")
          if [[ "${SIZE}" -ge $((2 * 1024 * 1024 * 1024)) ]]; then
            echo "::error::Archive ${ARCHIVE} is >= 2 GB (${SIZE} bytes); GitHub release assets max out at 2 GB"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.triple }}
          path: |
            llvm/verum-llvm-*.tar.zst
            llvm/verum-llvm-*.tar.zst.sha256
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Job 3 — attach the per-triple archives to the release tag, creating the
  # release when it does not exist yet. `--clobber` appends/overwrites only
  # the assets built in this run; previously published triples stay intact.
  # -------------------------------------------------------------------------
  publish:
    name: Publish prebuilt release
    needs: [resolve, build]
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release
          find _artifacts -type f \( -name '*.tar.zst' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          ls -lh release/
          [[ -n "$(ls -A release)" ]]

      - name: Publish / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.prebuilt_tag }}"
          if ! gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            NOTES_FILE=$(mktemp)
            {
              echo "Verum-specific LLVM prebuild for \`${{ needs.resolve.outputs.tag }}\`."
              echo
              echo "Built from \`llvm/llvm.toml\` by \`llvm/build.sh\` with:"
              echo "- projects: \`clang + lld + mlir\`"
              echo "- targets:  full cross-compile matrix (see \`llvm/llvm.toml\`)"
              echo "- build_type: \`MinSizeRel\` (static libraries)"
              echo
              echo "Consumed automatically by \`.github/actions/fetch-llvm\`"
              echo "in the main Verum CI / release workflows. Not a"
              echo "user-facing release."
            } > "${NOTES_FILE}"
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --prerelease \
              --title "Prebuilt LLVM ${{ needs.resolve.outputs.tag }}" \
              --notes-file "${NOTES_FILE}"
          fi
          gh release upload "${TAG}" release/* --repo "${GITHUB_REPOSITORY}" --clobber
