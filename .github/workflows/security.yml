name: Security Audit

on:
  push:
    branches: [main, develop]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'crates/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security audit weekly
    - cron: '0 0 * * 1'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  audit-dependencies:
    name: Cargo Audit (Dependencies)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report audit findings
        if: always()
        run: |
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          cargo audit --json > audit-report.json 2>&1 || true
          cat audit-report.json >> $GITHUB_STEP_SUMMARY || echo "No vulnerabilities detected" >> $GITHUB_STEP_SUMMARY

  deny-check:
    name: Cargo Deny (Policies)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: |
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check bans
          cargo deny check sources

      - name: Generate deny report
        if: always()
        run: |
          echo "## Cargo Deny Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Policies" >> $GITHUB_STEP_SUMMARY
          echo "- Advisories: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Licenses: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Bans: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Sources: Checked" >> $GITHUB_STEP_SUMMARY

  clippy-lint:
    name: Clippy Security Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy with security warnings
        run: |
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -W unsafe_code \
            -W missing_safety_docs \
            -W undocumented_unsafe_blocks \
            -W untagged_variant \
            -W trivial_casts \
            -W trivial_numeric_casts \
            -W unused_import_braces \
            -W unused_qualifications

      - name: Report clippy findings
        if: always()
        run: |
          echo "## Clippy Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Security lint checks completed" >> $GITHUB_STEP_SUMMARY

  unsafe-code-scan:
    name: Unsafe Code Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Count unsafe blocks
        run: |
          echo "## Unsafe Code Inventory" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -r "unsafe {" crates --include="*.rs" 2>/dev/null | wc -l)
          DOCUMENTED=$(grep -r "unsafe {" crates --include="*.rs" 2>/dev/null | grep -B1 "SAFETY" | grep "unsafe" | wc -l)
          UNDOCUMENTED=$((TOTAL - DOCUMENTED))

          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Total unsafe blocks: **$TOTAL**" >> $GITHUB_STEP_SUMMARY
          echo "- Documented (with SAFETY): **$DOCUMENTED**" >> $GITHUB_STEP_SUMMARY
          echo "- Undocumented: **$UNDOCUMENTED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $UNDOCUMENTED -gt 0 ]; then
            echo "⚠️ **Action Required**: Add SAFETY comments to undocumented unsafe blocks" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for SAFETY comments
        run: |
          echo "## SAFETY Comment Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          UNSAFE_BLOCKS=$(grep -r "unsafe {" crates --include="*.rs" 2>/dev/null | wc -l)
          SAFETY_COMMENTS=$(grep -r "// SAFETY" crates --include="*.rs" 2>/dev/null | wc -l)

          echo "- Unsafe blocks found: $UNSAFE_BLOCKS" >> $GITHUB_STEP_SUMMARY
          echo "- SAFETY comments found: $SAFETY_COMMENTS" >> $GITHUB_STEP_SUMMARY

      - name: Scan for dangerous patterns
        run: |
          echo "## Dangerous Pattern Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TRANSMUTE=$(grep -r "transmute\|transmute_copy" crates --include="*.rs" 2>/dev/null | wc -l)
          PTR_READ=$(grep -r "ptr::read" crates --include="*.rs" 2>/dev/null | wc -l)
          PTR_WRITE=$(grep -r "ptr::write" crates --include="*.rs" 2>/dev/null | wc -l)
          FROM_RAW=$(grep -r "from_raw\|from_utf8_unchecked" crates --include="*.rs" 2>/dev/null | wc -l)

          echo "### Detected Patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Transmute operations: $TRANSMUTE" >> $GITHUB_STEP_SUMMARY
          echo "- ptr::read operations: $PTR_READ" >> $GITHUB_STEP_SUMMARY
          echo "- ptr::write operations: $PTR_WRITE" >> $GITHUB_STEP_SUMMARY
          echo "- Unchecked conversions: $FROM_RAW" >> $GITHUB_STEP_SUMMARY

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Scan for potential secrets
        run: |
          echo "## Secret Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for common secret patterns
          SECRETS=0

          if grep -r "password\|secret\|api_key\|auth_token" . \
             --include="*.rs" --include="*.toml" \
             --include=".env*" --include="*credentials*" 2>/dev/null | \
             grep -v "test\|example\|TODO\|FIXME" > /tmp/secrets.txt 2>&1; then
            SECRETS=$(wc -l < /tmp/secrets.txt)
          fi

          if [ $SECRETS -gt 0 ]; then
            echo "⚠️ **Warning**: Potential secrets detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Review the following lines:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -20 /tmp/secrets.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No obvious secrets detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for .env files
        run: |
          if find . -name ".env*" -o -name "*credentials*" -o -name "*secrets*" | grep -qv ".gitignore"; then
            echo "⚠️ Warning: Environment or credential files detected" >> $GITHUB_STEP_SUMMARY
          fi

  format-check:
    name: Code Format & Style
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check code format
        run: cargo fmt --check

      - name: Report formatting issues
        if: failure()
        run: |
          echo "## Formatting Issues" >> $GITHUB_STEP_SUMMARY
          echo "Run 'cargo fmt' to fix formatting" >> $GITHUB_STEP_SUMMARY

  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-security-${{ hashFiles('**/Cargo.lock') }}

      - name: Run security tests
        run: |
          cargo test --test security_tests -- --nocapture --test-threads=1 || true

      - name: Report security test results
        if: always()
        run: |
          echo "## Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Security test suite execution completed" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [audit-dependencies, deny-check, clippy-lint, unsafe-code-scan, secret-scan, format-check, security-tests]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ License Policy Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Security Lint" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unsafe Code Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Detection" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Format Verification" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Test Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Documentation" >> $GITHUB_STEP_SUMMARY
          echo "For detailed security analysis, see [SECURITY_AUDIT.md](SECURITY_AUDIT.md)" >> $GITHUB_STEP_SUMMARY

      - name: Check overall status
        run: |
          if [ "${{ needs.audit-dependencies.result }}" = "failure" ]; then
            echo "Audit dependencies check failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.deny-check.result }}" = "failure" ]; then
            echo "Policy check failed" >> $GITHUB_STEP_SUMMARY
          fi

  miri-check:
    name: Miri Memory Safety Check
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust nightly with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Run miri on critical crates
        run: |
          cargo +nightly miri test -p verum_cbgr --lib 2>&1 | head -100 || echo "Miri check completed (may have expected failures)"

      - name: Report miri findings
        if: always()
        run: |
          echo "## Miri Memory Safety Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Miri analysis completed for critical unsafe code paths" >> $GITHUB_STEP_SUMMARY
