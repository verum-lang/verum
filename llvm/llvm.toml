# LLVM Build Configuration for Verum Compiler
#
# This file specifies which LLVM version and components to build/download.
# The build system will:
# 1. Check for llvm/install/ directory
# 2. Try to download prebuilt release from GitHub
# 3. Fall back to building from source if needed

[llvm]
# Git tag to use (e.g., "llvmorg-21.0.0", "llvmorg-21.1.8", or "main")
tag = "llvmorg-21.1.8"

# Repository URL
repo = "https://github.com/llvm/llvm-project.git"

# LLVM sub-projects to enable
# Required: lld (linker), mlir (code generation)
# Optional: clang (C/C++ frontend, useful for debugging)
projects = ["clang", "lld", "mlir"]

# CPU targets to build (#82 cross-compile matrix support).
#
# All major architectures Verum supports + cross-compile-validates:
#   * X86       — x86_64-{linux,darwin,windows,freebsd,openbsd,netbsd}
#   * AArch64   — arm64-{linux,darwin,windows} + aarch64-* embedded
#   * ARM       — 32-bit ARMv6/v7 (embedded, Raspberry Pi 3-)
#   * RISCV     — RV64GC server-class RISC-V SoCs + embedded
#   * PowerPC   — POWER8/9/10 IBM systems, big-endian server-class
#   * SystemZ   — s390x IBM z/Architecture
#   * BPF       — Linux kernel BPF, eBPF (tracing / networking)
#   * WebAssembly — wasm32-{unknown,wasi}
#
# Each target adds ~5-15 MB compressed to the prebuilt LLVM tarball;
# the win is verum binaries can cross-compile to any of these
# without per-machine LLVM rebuilds.
#
# Per `docs/architecture/no-libc-architecture.md` the codegen path
# is target-agnostic — all per-platform decisions read
# `module.get_triple()` (see `target_triple.rs`), so this list
# enables the full cross-compile matrix without extra work.
#
# **Format note**: build.sh parses this with `grep '^targets'` then
# `cut -d'[' -f2 | cut -d']' -f1`, so the value MUST stay on one
# line (no array wrapping).
targets = ["X86", "AArch64", "ARM", "RISCV", "PowerPC", "SystemZ", "BPF", "WebAssembly"]

# Build type: MinSizeRel, Release, RelWithDebInfo, Debug
# MinSizeRel is recommended for production (smallest binary size)
# Release provides best performance but larger binaries
build_type = "MinSizeRel"

# Use shallow clone to save disk space and time
shallow = true

# Additional CMake options (optional)
[cmake]
# Disable building shared libraries (we want static)
LLVM_BUILD_LLVM_DYLIB = "OFF"
LLVM_LINK_LLVM_DYLIB = "OFF"

# Static link C++ stdlib for portability
LLVM_STATIC_LINK_CXX_STDLIB = "ON"

# Disable assertions for release builds
LLVM_ENABLE_ASSERTIONS = "OFF"

# Disable Python bindings (not needed)
MLIR_ENABLE_BINDINGS_PYTHON = "OFF"

# Enable LLD as the linker for faster builds
LLVM_ENABLE_LLD = "ON"

# Prebuilt release configuration
[prebuilt]
# GitHub repository for prebuilt releases
repo = "verum-lang/verum"

# Release tag pattern (will be formatted with llvm.tag)
tag_pattern = "llvm-{tag}"

# Archive naming pattern
# Supported variables: {tag}, {os}, {arch}
archive_pattern = "llvm-{tag}-{os}-{arch}.tar.xz"
